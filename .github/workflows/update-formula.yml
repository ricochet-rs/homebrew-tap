name: Update Formula on Upstream Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version from ricochet-rs/cli (e.g., v0.2.0 or 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Setup tap
        run: |
          mkdir -p "$(brew --repo)/Library/Taps/ricochet-rs"
          ln -sf "$GITHUB_WORKSPACE" "$(brew --repo)/Library/Taps/ricochet-rs/homebrew-tap"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Switch remote to SSH for push with deploy key
          git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Parse version
        id: version
        run: |
          echo "Raw input: '${{ inputs.version }}'"
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "❌ Error: version input is required but was empty"
            exit 1
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Updating to version: ${VERSION}"

      - name: Update formula with brew bump-formula-pr
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/ricochet-rs/cli/archive/refs/tags/v${VERSION}.tar.gz"

          echo "Updating formula to version ${VERSION}"
          echo "Source URL: ${URL}"

          # May fail if the formula is already at this version (e.g. re-run),
          # which is fine — the resource update step handles the rest.
          brew bump-formula-pr \
            --url="${URL}" \
            --write-only \
            --no-browse \
            ricochet-rs/tap/ricochet || echo "⚠️ brew bump skipped (formula may already be at v${VERSION})"

      - name: Update ricochet-core resource
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Fetch Cargo.lock from the CLI release tag to find the pinned ricochet-core commit
          CARGO_LOCK=$(curl -sfL "https://raw.githubusercontent.com/ricochet-rs/cli/v${VERSION}/Cargo.lock")
          CORE_REV=$(echo "$CARGO_LOCK" | awk '/^name = "ricochet-core"/{getline;getline;sub(/.*#/,"");gsub(/"/,"");print}' | tr -d '[:space:]')

          if [ -z "$CORE_REV" ]; then
            echo "⚠️ Could not resolve ricochet-core revision from Cargo.lock, skipping resource update"
            exit 0
          fi
          echo "ricochet-core revision: $CORE_REV"

          # Find which tag in the ricochet repo points to this commit (check dereferenced ^{} entries for annotated tags)
          CORE_TAG=$(git ls-remote --tags https://github.com/ricochet-rs/ricochet.git \
            | grep "$CORE_REV" | sed 's|.*refs/tags/||' | sed 's/\^{}//' | sort -V | tail -1)

          if [ -n "$CORE_TAG" ]; then
            echo "ricochet-core tag: $CORE_TAG"
            sed -i "s|tag: \"[^\"]*\"|tag: \"$CORE_TAG\"|" Formula/ricochet.rb
            sed -i "s|revision: \"[^\"]*\"|revision: \"$CORE_REV\"|" Formula/ricochet.rb
          else
            echo "No tag found for $CORE_REV, using revision only"
            # Replace tag: + revision: lines with just revision:
            sed -i '/tag: "[^"]*",$/d' Formula/ricochet.rb
            sed -i "s|revision: \"[^\"]*\"|revision: \"$CORE_REV\"|" Formula/ricochet.rb
          fi
          echo "✅ Updated ricochet-core resource"

      - name: Commit, push, and create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if git diff --quiet Formula/ricochet.rb; then
            echo "ℹ️ No changes to formula — already up to date"
            exit 0
          fi

          # Set up SSH
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${{ secrets.ACTIONS_DEPLOY_KEY }}"

          git add Formula/ricochet.rb
          git commit -m "ricochet ${VERSION}"
          git push origin main
          echo "✅ Formula updated and pushed"

          # Create tag if it doesn't already exist
          if git ls-remote --tags origin "v${VERSION}" | grep -q .; then
            echo "ℹ️ Tag v${VERSION} already exists, deleting and recreating"
            git push origin ":refs/tags/v${VERSION}"
            git tag -d "v${VERSION}" 2>/dev/null || true
          fi
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

          echo "Tag v${VERSION} created"
          echo "Bottle build workflow will trigger automatically"
